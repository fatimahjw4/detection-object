<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Skin Disease Detector</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gradient-to-br from-yellow-100 to-orange-200 min-h-screen flex items-center justify-center">

<div class="bg-white rounded-3xl shadow-xl p-8 w-[400px] text-center">

    <h1 class="text-2xl font-bold mb-2">🐾 Skin Check</h1>
    <p class="text-gray-500 mb-4">Upload image of your pet</p>

    <!-- Upload -->
    <input type="file" id="imageInput" class="mb-4" />

    <div class="relative mb-4">
        <img id="preview" class="rounded-xl hidden w-full"/>
        <canvas id="canvas" class="absolute top-0 left-0"></canvas>
    </div>

    <!-- Button -->
    <button onclick="analyzeImage()" 
        class="bg-orange-400 hover:bg-orange-500 text-white px-4 py-2 rounded-xl w-full">
        Analyze 🔍
    </button>

    <!-- Loading -->
    <p id="loading" class="mt-3 text-gray-500 hidden">Analyzing...</p>

    <!-- Result -->
    <div id="result" class="mt-4"></div>

</div>

<script src="/static/js/main.js"></script>
</body>
</html>
